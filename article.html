            "influencer-collabs": {

                    ["p", "I built this channel from scratch for two different companies. We ended up getting inbound from companies we could have never reached on our own, and eventually got multiple enterprise deals in our pipeline."],
                    ["h2", "Step 1: Find the right influencers"],
                    ["p", "Start with bucketing your ICP. Let's say you sell to technical decision-makers: CTOs, Product Leaders, Enterprise Architects. Build buckets around those exact titles and look for influencers within each bucket."],

                    ["p", "Search listicles like “top CTOs to follow on LinkedIn.” Follow, like, and engage with their posts, and your feed will start surfacing more of them."],
                    ["p", "Then check the quality of comments on their posts. Are your actual buyers engaging? That's the signal."],
                    ["p", "We work with both micro influencers, around 5K-20K followers, and macro influencers, around 50K+. Macro gets you reach. Micro gets you quality leads. The comments on micro influencer posts are often more relevant."],
                    ["h2", "Step 2: Reach out the right way"],
                    ["p", "Cold DMs rarely work here. Relationship-building does."],
                    ["p", "Three ways we approach outreach: check if they have a contact form, email, or manager and reach out directly; look for mutual connections and ask for a warm intro; or write an article or post featuring them, then DM. Now you're not a stranger, you're someone who already gave them value."],
                    ["p", "When you do reach out, the pitch is simple: we've been following your work, here's what we do, and we'd love to co-create content that's useful for both our audiences."],

                    ["p", "Format 1: collaborative LinkedIn post. We co-created a post with the influencer on a topic their audience actually cares about. Subtle product mention, with the visual consistent with their brand voice."],

            "ai-positioning": {
                title: "How to position your AI product to get first 500 customers?",
                dek: "A practical positioning working session for early AI products: what you’re replacing, who you’re really for, and the category game you’re choosing.",
                source: "https://x.com/aaina_narang/status/2034875778631180377?s=20",
                body: [
                    ["p", "The pace of what's getting built in AI is insane. And one of the best ways to differentiate is winning on positioning."],
                    ["p", "I've spent the last couple of years positioning early-stage products across B2B and B2C SaaS. So I pulled together what actually applies to early AI products and ran it on a few I've worked with."],
                    ["p", "Now pull up a doc and let's start. This is a working session."],
                    ["h2", "Start with the most honest question you'll ask yourself"],
                    ["p", "What would your customer do if your product didn't exist?"],
                    ["p", "A tool they're already paying for, a person they'd hire, or a process they'd suffer through. Write it down."],
                    ["p", "This matters because your positioning has to be better than that specific thing."],
                    ["p", "For instance, Harvey's real competition was associates manually reviewing contracts until midnight. Knowing that changed how they priced, how they pitched, and who they went after first."],
                    ["h2", "Then figure out what you actually have"],
                    ["p", "Now that you know what you're up against, ask what your product does that the workaround genuinely cannot."],
                    ["p", "Make a list of specifics. If the spreadsheet can also do it, it doesn't go on the list. If your competitor shipped it last month, think hard about whether it belongs. You're looking for things that are actually yours."],
                    ["p", "Cursor's positioning, for instance, was clear: it understands your entire codebase, suggests full functions in context, and rewrites on instruction."],
                    ["p", "Now run each thing on your list through a simple chain: feature, benefit, and outcome for a human."],
                    ["p", "Then go talk to your five customers and check if the outcomes you wrote match what they actually complained about. If they don't line up, something's off. Either your list is wrong or you're talking to the wrong people."],
                    ["h2", "Get specific about who you're actually for"],
                    ["p", "“Developers,” “startups,” or “anyone building with AI” is definitely not an answer."],
                    ["p", "Which developers, doing what, at what stage, and with what specific frustration that is costing them real time or real money this week?"],
                    ["p", "You need to go narrow here. It feels counterintuitive. It feels like you're leaving people out. But you're making it easy for the right people to self-select in immediately."],
                    ["p", "Geoffrey Moore talks about this in Crossing the Chasm. You win the broader market by winning one specific beachhead first. The beachhead is a real person with a real problem who will tell three other people the moment you solve it."],
                    ["p", "Harvey's beachhead was BigLaw associates doing document review before depositions. That's a moment, not a demographic."],
                    ["blockquote", "This is most valuable for ______ who are currently struggling with ______."],
                    ["p", "Then go validate it. Post in one community where that person hangs out. Write one tweet describing the problem in their language. Watch who responds."],
                    ["h2", "Name the game you're playing"],
                    ["p", "This is the category question."],
                    ["p", "It tells your buyer what to compare you against and what to expect before they even sign up. Get it right and the rest of your positioning clicks into place fast."],
                    ["p", "Some products need a new category because the existing options are so different that comparisons would confuse people. Perplexity didn't call itself a search engine but an answer engine. That one word change shifted the user's entire expectation."],
                    ["blockquote", "We are a ______ for ______."],
                    ["p", "Category. Specific person. One line. Read it back. If it sounds like it could be anyone's tagline, it's not specific enough yet."],

                    ["p", "You've done the thinking, now try five taglines. Honestly, just mess around. Something that makes a person in your ICP think “this is for me” the moment they read it."],
                    ["p", "Try a two sentence version of what you do and read it out loud."],
                    ["p", "Try the full blurb: problem, who has it, what you do, what changes for them. Four sentences max."],
                    ["p", "Show it to someone who fits your ICP. Watch their face when they read it. If they lean in and want to know more, you're close. If they ask “but what does it actually do,” go back to the outcomes exercise."],
                    ["p", "Keep talking to people throughout this. Stay close to them and update the narrative."],
                    ["p", "Start specific and the rest follows."]
                ]

            "founder-branding": {
                title: "Founder branding is the cheapest sales channel you'll ever own",
                dek: "What I’d hand any technical founder before they post their first thing: a system for making conviction, taste, and category thinking legible to buyers.",
                source: "https://x.com/aaina_narang/status/2034159289380593712?s=20",
                body: [
                    ["p", "I've spent 4 years running branding for B2B SaaS companies. Almost every founder I've worked with said the same thing on the kickoff call: I want the brand but I don't want to be hyperactive on socials, please don't ask me to be a different person."],
                    ["p", "So I built a system. Then I ran it across enough accounts that the patterns started showing up: 5 founders, millions of combined impressions, multiple mid six-figure pipeline traceable directly to brand."],
                    ["p", "I am sharing what I'd hand any technical founder before they post their first thing."],
                    ["h2", "Why even bother?"],
                    ["p", "Honestly, founder branding is the cheapest sales channel you'll ever own. The pipeline you generate through it doesn't carry an absurd CAC. The brand you build now is what hires for you in 2 years and gets your next round taken seriously. Skip it and it becomes the tax you pay later."],
                    ["p", "You have 10 competitors shipping similar features. You'll have 50 by next year. Half of them will raise more than you. The product moat in B2B SaaS gets thinner every quarter."],
                    ["p", "The thing that doesn't compress is you."],

                    ["p", "Buyers don't just buy software anymore. They buy the founder behind it. They buy the bet that the person building this thing is going to keep building it long after they sign the contract."],
                    ["p", "Founder branding is how that bet becomes legible to the people writing the checks."],
                    ["h2", "How to think about it"],
                    ["p", "More than thought leadership, it is a system for making the right people aware of you. The cringe disappears the moment you stop performing and start being yourself."],
                    ["p", "The first move is positioning yourself: April Dunford's framework, applied to your voice instead of your product."],
                    ["blockquote", "Who are the alternatives to following you? What’s unique about your perspective? Who specifically benefits from it?"],
                    ["p", "Sit with that for 30 minutes alone before you write anything."],
                    ["h2", "How to do it across multiple channels without it eating your week"],
                    ["p", "Each channel does a different job. Please stop trying to make one channel do everything for you."],
                    ["p", "Twitter is where your buyers, peers, operators and investors live. It builds reputation among insiders. Patrick Collison, Guillermo Rauch, Tobi Lütke all build here. Be short, opinionated and frequent here. Write Twitter articles once in a while for deep dives."],
                    ["p", "LinkedIn builds pipeline. Different post types work here than on Twitter. Longer, more operational, named-audience hooks in line one. Engage with other people and most importantly your prospects. You might want to call LinkedIn cringe, but it still does its job."],

                    ["p", "Podcasts are where you borrow credibility from established audiences. Go on the right five. Have someone reach out on your behalf. If you get inbound, even better."],
                    ["p", "The mechanic that makes this possible without 5x the writing time: write once, adapt four times."],
                    ["p", "One piece of thinking ships as a Twitter thread, a LinkedIn post, a Substack expansion, and a 90-second clip-worthy take you can land in podcast intros for the next quarter."],

                    ["p", "Also remember: viral takes pull 50K impressions and 0 inbound, but the niche take pulls 5K impressions and 3 conversations."],

                    ["h2", "What to do this week"],

                    ["p", "Sit with the positioning exercise for 30 minutes. Just that."],
                    ["p", "And never forget to distribute, because the brand is only built when one piece of clear thinking gets distributed everywhere the right people are."]
                ]
            },
            "seo-b2b-saas": {

                    ["h2", "What thought leadership does for SEO that tactics alone can't"],
                    ["p", "The blogs that drove the most pipeline weren't always the ones ranking #1. Some of them barely ranked at all."],
                    ["p", "They got forwarded in Slack channels and WhatsApp groups, shared in founder communities, and mentioned in newsletters with up to 10,000 subscribers in our exact ICP."],
                    ["p", "One blog got picked up by a Substack in our space: 600 clicks in 48 hours, 3 demo requests."],
                    ["p", "More backlinks from that one mention than from two months of outreach."],
                    ["p", "Original research, genuine opinions, and specific numbers travel."],
                    ["p", "“Here's what we tried, here's what happened, here's the number” is a format that gets shared."],
                    ["p", "Thought leadership isn't a brand play, it's a distribution strategy. And it feeds your SEO in ways that content volume alone never will."],
                    ["h2", "What a working B2B SaaS SEO strategy actually looks like"],
                    ["p", "Start with 8-10 bottom-of-funnel pages. High intent, low competition, specific to your ICP. Write them with real depth and a real opinion."],
                    ["p", "Build content clusters around your core use cases that feed authority back to those pages. Fix your CTAs before you scale traffic. Use Claude to accelerate research and structure, but put your experience into every blog."],
                    ["p", "Then distribute each piece like it's a product launch. Communities. Newsletters. LinkedIn. Founder accounts. Measure demo-influenced traffic and pipeline, not sessions."],
                    ["p", "And check your branded vs non-branded split before you celebrate any traffic milestone. If 80% of your organic visitors already knew your name, the SEO work hasn't started yet."],
                    ["p", "Done right, organic compounds. A blog you write this weekend can drive demos for the next three years."]
                ]
            }
        };

        const params = new URLSearchParams(window.location.search);
        const slug = params.get("post") || "webinars";
        const post = posts[slug];
        const title = document.querySelector("#article-title");
        const dek = document.querySelector("#article-dek");
        const body = document.querySelector("#article-body");
        const original = document.querySelector("#original-link");

        function renderItem([type, text]) {
            const element = document.createElement(type === "blockquote" ? "blockquote" : type);
            const paragraph = type === "blockquote" ? document.createElement("p") : null;
            const target = paragraph || element;
            target.textContent = text;
            if (paragraph) element.appendChild(paragraph);
            return element;
        }

        if (!post) {
            title.textContent = "Article not found";
            dek.textContent = "This article link does not exist yet.";
            original.style.display = "none";
            body.innerHTML = "<p class='missing'>Go back to the thoughts page and choose another piece.</p>";
        } else {
            document.title = `${post.title} | Aaina Narang`;
            title.textContent = post.title;
            dek.textContent = post.dek;
            original.href = post.source;
            post.body.forEach((item) => body.appendChild(renderItem(item)));
        }
    </script>
</body>
</html>
